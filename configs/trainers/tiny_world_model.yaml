trainer_id: tiny_world_model_script
display_name: Tiny 世界模型训练器
runtime: python
entrypoint: ../../scripts/train_world_model.py
description: 通过通用训练器接口训练内置轻量动力学模型。
input:
  dataset_format: any_registered_adapter
parameters:
  ridge:
    type: float
    default: 0.0001
arguments:
  - "{dataset_root}"
  - "--adapter"
  - "{adapter}"
  - "--output"
  - "{output_dir}"
  - "--ridge"
  - "{params.ridge}"
outputs:
  artifact_type: world_model
