schema_version: 1
trainer_id: tiny_world_model_script
display_name: Tiny 世界模型训练器
launch:
  kind: python_script
  entrypoint: ../../scripts/train_world_model.py
  working_directory: ../..
description: 通过通用训练器接口训练内置轻量动力学模型。
input:
  dataset_format: any_registered_adapter
  required_modalities: []
  optional_modalities:
    - front_rgb
    - depth
    - lidar_points
parameters:
  ridge:
    type: float
    default: 0.0001
    min: 0.00000001
    max: 1.0
    description: Ridge regression regularization strength.
arguments:
  - "{dataset_root}"
  - "--adapter"
  - "{adapter}"
  - "--output"
  - "{output_dir}"
  - "--ridge"
  - "{params.ridge}"
outputs:
  artifact_type: world_model
inference:
  launch:
    kind: python_script
    entrypoint: ../../scripts/infer_world_model.py
    working_directory: ../..
  input:
    dataset_format: any_registered_adapter
  parameters:
    max_samples:
      type: int
      default: 100
      min: 1
      max: 10000
  arguments:
    - "{artifact_path}"
    - "{dataset_root}"
    - --adapter
    - "{adapter}"
    - --sequence-id
    - "{sequence_id}"
    - --output
    - "{output_dir}"
    - --max-samples
    - "{params.max_samples}"
  outputs:
    predictions_file: predictions.json
    metrics_file: metrics.json
    preview_file: trajectory_comparison.png
