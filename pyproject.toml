[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "offroad-sim-bench"
version = "0.1.0"
description = "Local off-road autonomous driving simulation and world-model evaluation platform."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "pydantic>=2.0",
  "pyyaml>=6.0",
  "gymnasium>=0.29",
  "rich>=13.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.setuptools.packages.find]
include = ["offroad_sim*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

